  <div id="results"></div>

<script type="module">
import { TournamentAlgorithm } from './src/algorithm.js';

function shuffle(arr) {
  return TournamentAlgorithm.shuffle(arr);
}

function generateSchedule(playerCount, courts, numRounds) {
  return TournamentAlgorithm.generateSchedule(playerCount, courts, numRounds);
}

// Make runAllTests available to the onclick handler in HTML
window.runAllTests = runAllTests;

// ═══════════════════════════════════════════════════════
// TEST FRAMEWORK
// ═══════════════════════════════════════════════════════

class TestRunner {
  constructor() {
    this.tests = [];
    this.results = [];
  }

  test(name, fn) {
    this.tests.push({ name, fn });
  }

  async runAll() {
    this.results = [];
    const startTime = performance.now();

    for (let i = 0; i < this.tests.length; i++) {
      const test = this.tests[i];
      const progress = ((i + 1) / this.tests.length) * 100;
      document.getElementById('progressBar').style.width = progress + '%';
      
      try {
        await test.fn();
        this.results.push({ name: test.name, passed: true });
      } catch (error) {
        this.results.push({ name: test.name, passed: false, error: error.message });
      }
      
      await new Promise(resolve => setTimeout(resolve, 10)); // Allow UI update
    }

    const duration = Math.round(performance.now() - startTime);
    return { results: this.results, duration };
  }
}

function assert(condition, message) {
  if (!condition) throw new Error(message || 'Assertion failed');
}

function assertEqual(actual, expected, message) {
  if (actual !== expected) {
    throw new Error(message || `Expected ${expected}, got ${actual}`);
  }
}

function assertRange(value, min, max, message) {
  if (value < min || value > max) {
    throw new Error(message || `Expected value between ${min} and ${max}, got ${value}`);
  }
}

// ═══════════════════════════════════════════════════════
// TEST SUITES
// ═══════════════════════════════════════════════════════

const runner = new TestRunner();

// ─── BASIC SCHEDULE GENERATION ───
runner.test('Generates correct number of rounds', () => {
  const { schedule } = generateSchedule(8, 2, 5);
  assertEqual(schedule.length, 5, 'Should have 5 rounds');
});

runner.test('Each round has correct number of matches', () => {
  const { schedule } = generateSchedule(12, 3, 4);
  schedule.forEach((round, i) => {
    assertEqual(round.matches.length, 3, `Round ${i+1} should have 3 matches`);
  });
});

runner.test('Each match has 4 players (2 teams of 2)', () => {
  const { schedule } = generateSchedule(16, 4, 3);
  schedule.forEach((round, ri) => {
    round.matches.forEach((match, mi) => {
      assertEqual(match.t1.length, 2, `Round ${ri+1} Match ${mi+1} team 1 should have 2 players`);
      assertEqual(match.t2.length, 2, `Round ${ri+1} Match ${mi+1} team 2 should have 2 players`);
    });
  });
});

runner.test('Works with minimum players (4)', () => {
  const { schedule } = generateSchedule(4, 1, 3);
  assertEqual(schedule.length, 3, 'Should handle 4 players');
  schedule.forEach(round => {
    assertEqual(round.matches.length, 1, 'Should have 1 match per round');
    assertEqual(round.sitting.length, 0, 'No one should sit out with 4 players');
  });
});

runner.test('Works with large player count (50)', () => {
  const { schedule } = generateSchedule(50, 6, 8);
  assertEqual(schedule.length, 8, 'Should handle 50 players');
  schedule.forEach(round => {
    assert(round.matches.length <= 6, 'Should not exceed court count');
  });
});

runner.test('Works with odd player counts', () => {
  const { schedule } = generateSchedule(9, 2, 3);
  assertEqual(schedule.length, 3, 'Should handle 9 players');
  schedule.forEach(round => {
    assertEqual(round.sitting.length, 1, 'One player should sit out');
  });
});

// ─── PARTNER ROTATION (AMERICANO LOGIC) ───
runner.test('Players rotate partners across rounds', () => {
  const { schedule, pairCount } = generateSchedule(8, 2, 6);
  
  // Check that most players have partnered with different people
  let totalPairings = 0;
  let repeatPairings = 0;
  
  for (let i = 0; i < 8; i++) {
    for (let j = i + 1; j < 8; j++) {
      const count = pairCount[i][j];
      if (count > 0) totalPairings++;
      if (count > 1) repeatPairings++;
    }
  }
  
  // With 8 players, 6 rounds, 2 courts, we expect good rotation
  assert(totalPairings > 5, `Should create multiple unique pairings, got ${totalPairings}`);
});

runner.test('No player partners with themselves', () => {
  const { schedule } = generateSchedule(12, 3, 5);
  
  schedule.forEach((round, ri) => {
    round.matches.forEach((match, mi) => {
      const allPlayers = [...match.t1, ...match.t2];
      const unique = new Set(allPlayers);
      assertEqual(unique.size, 4, `Round ${ri+1} Match ${mi+1} should have 4 unique players`);
    });
  });
});

runner.test('Minimizes repeat partnerships', () => {
  const { pairCount } = generateSchedule(12, 3, 10);
  
  // Count how many pairs appear more than twice
  let highRepeatCount = 0;
  for (let i = 0; i < 12; i++) {
    for (let j = i + 1; j < 12; j++) {
      if (pairCount[i][j] > 2) highRepeatCount++;
    }
  }
  
  // Should minimize repeats (some are unavoidable with 10 rounds)
  assert(highRepeatCount < 15, `Too many repeat partnerships: ${highRepeatCount}`);
});

// ─── PLAYER DISTRIBUTION ───
runner.test('Each player plays roughly equal games', () => {
  const { schedule } = generateSchedule(10, 2, 8);
  
  const gamesPerPlayer = new Array(10).fill(0);
  schedule.forEach(round => {
    round.matches.forEach(match => {
      match.t1.forEach(p => gamesPerPlayer[p]++);
      match.t2.forEach(p => gamesPerPlayer[p]++);
    });
  });
  
  const min = Math.min(...gamesPerPlayer);
  const max = Math.max(...gamesPerPlayer);
  const avg = gamesPerPlayer.reduce((a,b) => a+b, 0) / gamesPerPlayer.length;
  
  // With 10 players, 2 courts (8 slots), 8 rounds:
  // Total games = 64, so avg = 6.4 per player
  // Should achieve max difference of 1
  assert(max - min <= 1, `Game distribution too uneven: min=${min}, max=${max}, diff=${max-min}, avg=${avg.toFixed(1)}, distribution=${gamesPerPlayer.join(',')}`);
});

runner.test('Sitting out rotates fairly', () => {
  const { schedule } = generateSchedule(13, 3, 6);
  
  const sitOutCount = new Array(13).fill(0);
  schedule.forEach(round => {
    round.sitting.forEach(p => sitOutCount[p]++);
  });
  
  const min = Math.min(...sitOutCount);
  const max = Math.max(...sitOutCount);
  
  assert(max - min <= 1, `Sit-out distribution too uneven: min=${min}, max=${max}, diff=${max-min}`);
});

// ─── COURT ASSIGNMENT ───
runner.test('Courts are numbered correctly', () => {
  const { schedule } = generateSchedule(16, 4, 3);
  
  schedule.forEach((round, ri) => {
    round.matches.forEach((match, mi) => {
      assertEqual(match.court, mi, `Round ${ri+1} court numbering should start at 0`);
    });
  });
});

runner.test('Never exceeds available courts', () => {
  const courts = 3;
  const { schedule } = generateSchedule(20, courts, 5);
  
  schedule.forEach((round, ri) => {
    assert(round.matches.length <= courts, 
      `Round ${ri+1} has ${round.matches.length} matches but only ${courts} courts available`);
  });
});

// ─── EDGE CASES ───
runner.test('Handles exactly 4 players per court', () => {
  const { schedule } = generateSchedule(8, 2, 4);
  
  schedule.forEach(round => {
    const playersInMatches = new Set();
    round.matches.forEach(match => {
      match.t1.forEach(p => playersInMatches.add(p));
      match.t2.forEach(p => playersInMatches.add(p));
    });
    assertEqual(playersInMatches.size, 8, 'All 8 players should play when there are exactly 2 courts');
    assertEqual(round.sitting.length, 0, 'No one should sit out');
  });
});

runner.test('Handles insufficient players for all courts', () => {
  const { schedule } = generateSchedule(6, 5, 3);
  
  schedule.forEach(round => {
    assertEqual(round.matches.length, 1, 'Should only use 1 court with 6 players');
    assertEqual(round.sitting.length, 2, '2 players should sit out');
  });
});

runner.test('No duplicate players in a single round', () => {
  const { schedule } = generateSchedule(20, 5, 4);
  
  schedule.forEach((round, ri) => {
    const playersThisRound = new Set();
    round.matches.forEach(match => {
      match.t1.forEach(p => {
        assert(!playersThisRound.has(p), `Round ${ri+1}: Player ${p} appears twice`);
        playersThisRound.add(p);
      });
      match.t2.forEach(p => {
        assert(!playersThisRound.has(p), `Round ${ri+1}: Player ${p} appears twice`);
        playersThisRound.add(p);
      });
    });
  });
});

// ─── CONSISTENCY ───
runner.test('Multiple generations produce valid schedules', () => {
  for (let i = 0; i < 5; i++) {
    const { schedule } = generateSchedule(16, 4, 5);
    assertEqual(schedule.length, 5, `Generation ${i+1} should have 5 rounds`);
    
    schedule.forEach(round => {
      round.matches.forEach(match => {
        assertEqual(match.t1.length, 2, 'Team 1 should have 2 players');
        assertEqual(match.t2.length, 2, 'Team 2 should have 2 players');
      });
    });
  }
});

// ─── ADDITIONAL EDGE CASES ───
runner.test('Handles 5 players (1 sits out each round)', () => {
  const { schedule } = generateSchedule(5, 1, 6);
  schedule.forEach((round, ri) => {
    assertEqual(round.matches.length, 1, `Round ${ri+1} should have 1 match`);
    assertEqual(round.sitting.length, 1, `Round ${ri+1} should have 1 player sitting`);
  });
});

runner.test('Handles 6 players perfectly (no sit-outs with 1 court)', () => {
  const { schedule } = generateSchedule(6, 1, 4);
  schedule.forEach((round, ri) => {
    assertEqual(round.matches.length, 1, `Round ${ri+1} should have 1 match`);
    assertEqual(round.sitting.length, 2, `Round ${ri+1} should have 2 players sitting`);
  });
});

runner.test('Handles 7 players (3 sit out each round)', () => {
  const { schedule } = generateSchedule(7, 1, 5);
  schedule.forEach(round => {
    assertEqual(round.matches.length, 1, 'Should have 1 match');
    assertEqual(round.sitting.length, 3, 'Should have 3 players sitting');
  });
});

runner.test('Handles large tournament (24 players, 6 courts, 12 rounds)', () => {
  const { schedule } = generateSchedule(24, 6, 12);
  assertEqual(schedule.length, 12, 'Should have 12 rounds');
  
  schedule.forEach((round, ri) => {
    assertEqual(round.matches.length, 6, `Round ${ri+1} should have 6 matches`);
    assertEqual(round.sitting.length, 0, `Round ${ri+1} should have no sit-outs (24 players = 6 courts × 4)`);
  });
});

runner.test('Handles very large tournament (50 players, 10 courts)', () => {
  const { schedule } = generateSchedule(50, 10, 8);
  assertEqual(schedule.length, 8, 'Should have 8 rounds');
  
  schedule.forEach(round => {
    assertEqual(round.matches.length, 10, 'Should have 10 matches');
    assertEqual(round.sitting.length, 10, 'Should have 10 players sitting (50 - 40)');
  });
});

runner.test('Handles many rounds (stress test)', () => {
  const { schedule } = generateSchedule(12, 3, 20);
  assertEqual(schedule.length, 20, 'Should handle 20 rounds');
  
  // Verify all rounds are valid
  schedule.forEach((round, ri) => {
    assert(round.matches.length <= 3, `Round ${ri+1} should not exceed 3 courts`);
    round.matches.forEach(match => {
      assertEqual(match.t1.length, 2, 'Team 1 should have 2 players');
      assertEqual(match.t2.length, 2, 'Team 2 should have 2 players');
    });
  });
});

// ─── PARTNER ROTATION STRESS TESTS ───
runner.test('Minimizes repeats with many rounds (16 players, 10 rounds)', () => {
  const { pairCount } = generateSchedule(16, 4, 10);
  
  let maxRepeats = 0;
  for (let i = 0; i < 16; i++) {
    for (let j = i + 1; j < 16; j++) {
      maxRepeats = Math.max(maxRepeats, pairCount[i][j]);
    }
  }
  
  // With 16 players, 4 courts, 10 rounds - some repeats are inevitable
  assert(maxRepeats <= 3, `Max repeat partnerships should be ≤3, got ${maxRepeats}`);
});

runner.test('Good partner distribution (8 players, 6 rounds)', () => {
  const { pairCount } = generateSchedule(8, 2, 6);
  
  // Count unique partnerships per player
  const uniquePartnersPerPlayer = new Array(8).fill(0);
  for (let i = 0; i < 8; i++) {
    for (let j = 0; j < 8; j++) {
      if (i !== j && pairCount[i][j] > 0) {
        uniquePartnersPerPlayer[i]++;
      }
    }
  }
  
  // Each player should partner with multiple different people
  uniquePartnersPerPlayer.forEach((count, player) => {
    assert(count >= 3, `Player ${player} should partner with at least 3 different people, got ${count}`);
  });
});

// ─── FAIRNESS ACROSS DIFFERENT CONFIGURATIONS ───
runner.test('Fair distribution: 11 players, 2 courts, 10 rounds', () => {
  const { schedule } = generateSchedule(11, 2, 10);
  
  const gamesPerPlayer = new Array(11).fill(0);
  schedule.forEach(round => {
    round.matches.forEach(match => {
      match.t1.forEach(p => gamesPerPlayer[p]++);
      match.t2.forEach(p => gamesPerPlayer[p]++);
    });
  });
  
  const min = Math.min(...gamesPerPlayer);
  const max = Math.max(...gamesPerPlayer);
  
  assert(max - min <= 1, `Games distribution should be fair: min=${min}, max=${max}`);
});

runner.test('Fair distribution: 15 players, 3 courts, 12 rounds', () => {
  const { schedule } = generateSchedule(15, 3, 12);
  
  const gamesPerPlayer = new Array(15).fill(0);
  schedule.forEach(round => {
    round.matches.forEach(match => {
      match.t1.forEach(p => gamesPerPlayer[p]++);
      match.t2.forEach(p => gamesPerPlayer[p]++);
    });
  });
  
  const min = Math.min(...gamesPerPlayer);
  const max = Math.max(...gamesPerPlayer);
  
  // With 15 players and 12 slots per round
  // 144 total games / 15 players = 9.6 avg
  // With game balance as top priority, should achieve diff = 1
  assert(max - min <= 1, `Games distribution should be fair: min=${min}, max=${max}, diff=${max-min}`);
});

runner.test('Fair distribution: 20 players, 5 courts, 8 rounds', () => {
  const { schedule } = generateSchedule(20, 5, 8);
  
  const gamesPerPlayer = new Array(20).fill(0);
  schedule.forEach(round => {
    round.matches.forEach(match => {
      match.t1.forEach(p => gamesPerPlayer[p]++);
      match.t2.forEach(p => gamesPerPlayer[p]++);
    });
  });
  
  const min = Math.min(...gamesPerPlayer);
  const max = Math.max(...gamesPerPlayer);
  
  assert(max - min <= 1, `Games distribution should be fair: min=${min}, max=${max}`);
});

runner.test('Fair distribution: 50 players, 6 courts, 6 rounds', () => {
  const { schedule } = generateSchedule(50, 6, 6);
  
  const gamesPerPlayer = new Array(50).fill(0);
  schedule.forEach(round => {
    round.matches.forEach(match => {
      match.t1.forEach(p => gamesPerPlayer[p]++);
      match.t2.forEach(p => gamesPerPlayer[p]++);
    });
  });
  
  const min = Math.min(...gamesPerPlayer);
  const max = Math.max(...gamesPerPlayer);
  
  // With 50 players and 24 slots per round (6 courts × 4 players), 6 rounds
  // Total: 144 player-games / 50 players = 2.88 games per player
  // With deterministic selection of least-played players, should achieve diff ≤ 1
  assert(max - min <= 1, `Games distribution should be fair: min=${min}, max=${max}, diff=${max-min}`);
});

// ─── SIT-OUT FAIRNESS VARIATIONS ───
runner.test('Fair sit-outs: 9 players, 2 courts, 10 rounds', () => {
  const { schedule } = generateSchedule(9, 2, 10);
  
  const sitOutCount = new Array(9).fill(0);
  schedule.forEach(round => {
    round.sitting.forEach(p => sitOutCount[p]++);
  });
  
  const min = Math.min(...sitOutCount);
  const max = Math.max(...sitOutCount);
  
  assert(max - min <= 2, `Sit-out distribution should be fair: min=${min}, max=${max}`);
});

runner.test('Fair sit-outs: 17 players, 4 courts, 8 rounds', () => {
  const { schedule } = generateSchedule(17, 4, 8);
  
  const sitOutCount = new Array(17).fill(0);
  schedule.forEach(round => {
    round.sitting.forEach(p => sitOutCount[p]++);
  });
  
  const min = Math.min(...sitOutCount);
  const max = Math.max(...sitOutCount);
  
  assert(max - min <= 2, `Sit-out distribution should be fair: min=${min}, max=${max}`);
});

// ─── COURT UTILIZATION ───
runner.test('Maximizes court usage with enough players', () => {
  const courts = 5;
  const { schedule } = generateSchedule(30, courts, 6);
  
  schedule.forEach((round, ri) => {
    assertEqual(round.matches.length, courts, `Round ${ri+1} should use all ${courts} courts`);
  });
});

runner.test('Handles more courts than needed', () => {
  const { schedule } = generateSchedule(8, 10, 4);
  
  schedule.forEach(round => {
    assertEqual(round.matches.length, 2, 'Should only use 2 courts (8 players ÷ 4)');
  });
});

// ─── STRUCTURAL INTEGRITY ───
runner.test('All players accounted for each round', () => {
  const { schedule } = generateSchedule(14, 3, 8);
  
  schedule.forEach((round, ri) => {
    const playingPlayers = new Set();
    round.matches.forEach(match => {
      match.t1.forEach(p => playingPlayers.add(p));
      match.t2.forEach(p => playingPlayers.add(p));
    });
    
    const sittingPlayers = new Set(round.sitting);
    const totalAccounted = playingPlayers.size + sittingPlayers.size;
    
    assertEqual(totalAccounted, 14, `Round ${ri+1} should account for all 14 players`);
    
    // No overlap between playing and sitting
    round.sitting.forEach(p => {
      assert(!playingPlayers.has(p), `Round ${ri+1}: Player ${p} cannot both play and sit out`);
    });
  });
});

runner.test('Team composition is always 2v2', () => {
  const { schedule } = generateSchedule(18, 4, 10);
  
  schedule.forEach((round, ri) => {
    round.matches.forEach((match, mi) => {
      assertEqual(match.t1.length, 2, `Round ${ri+1} Match ${mi+1} team 1 must have exactly 2 players`);
      assertEqual(match.t2.length, 2, `Round ${ri+1} Match ${mi+1} team 2 must have exactly 2 players`);
      
      // Teams don't share players
      const allPlayers = [...match.t1, ...match.t2];
      const unique = new Set(allPlayers);
      assertEqual(unique.size, 4, `Round ${ri+1} Match ${mi+1} must have 4 unique players`);
    });
  });
});

// ─── RANDOMNESS & VARIATION ───
runner.test('Generates different schedules on multiple runs', () => {
  const schedules = [];
  for (let i = 0; i < 3; i++) {
    const { schedule } = generateSchedule(8, 2, 4);
    schedules.push(JSON.stringify(schedule));
  }
  
  // At least 2 should be different (due to randomness)
  const unique = new Set(schedules);
  assert(unique.size >= 2, 'Should generate varied schedules across runs');
});

// ─── PERFORMANCE / COMPLEXITY ───
runner.test('Completes in reasonable time (medium complexity)', () => {
  const start = performance.now();
  generateSchedule(20, 5, 10);
  const duration = performance.now() - start;
  
  assert(duration < 5000, `Should complete in <5s, took ${duration.toFixed(0)}ms`);
});

runner.test('Completes in reasonable time (high complexity)', () => {
  const start = performance.now();
  generateSchedule(40, 8, 12);
  const duration = performance.now() - start;
  
  assert(duration < 10000, `Should complete in <10s, took ${duration.toFixed(0)}ms`);
});

// ═══════════════════════════════════════════════════════
// UI & EXECUTION
// ═══════════════════════════════════════════════════════

async function runAllTests() {
  const btn = document.getElementById('runBtn');
  const progress = document.getElementById('progress');
  const summary = document.getElementById('summary');
  const results = document.getElementById('results');
  
  btn.disabled = true;
  btn.textContent = 'Running...';
  progress.style.display = 'block';
  summary.style.display = 'none';
  results.innerHTML = '';
  
  const { results: testResults, duration } = await runner.runAll();
  
  const passed = testResults.filter(r => r.passed).length;
  const failed = testResults.filter(r => !r.passed).length;
  
  // Update summary
  document.getElementById('totalTests').textContent = testResults.length;
  document.getElementById('passedTests').textContent = passed;
  document.getElementById('failedTests').textContent = failed;
  document.getElementById('duration').textContent = duration + 'ms';
  summary.style.display = 'flex';
  
  // Group tests
  const groups = {
    'Basic Schedule Generation': testResults.slice(0, 7),
    'Partner Rotation (Americano Logic)': testResults.slice(7, 10),
    'Player Distribution': testResults.slice(10, 12),
    'Court Assignment': testResults.slice(12, 14),
    'Edge Cases': testResults.slice(14, 17),
    'Consistency': testResults.slice(17, 18),
    'Additional Edge Cases': testResults.slice(18, 24),
    'Partner Rotation Stress Tests': testResults.slice(24, 26),
    'Fairness Across Different Configurations': testResults.slice(26, 30),
    'Sit-Out Fairness Variations': testResults.slice(30, 32),
    'Court Utilization': testResults.slice(32, 34),
    'Structural Integrity': testResults.slice(34, 36),
    'Randomness & Variation': testResults.slice(36, 37),
    'Performance / Complexity': testResults.slice(37)
  };
  
  let html = '';
  for (const [groupName, tests] of Object.entries(groups)) {
    html += `<div class="test-group">
      <h2>${groupName}</h2>`;
    
    tests.forEach(test => {
      const icon = test.passed ? '✓' : '✗';
      const statusClass = test.passed ? 'test-pass' : 'test-fail';
      html += `
        <div class="test-case">
          <div class="test-icon ${statusClass}">${icon}</div>
          <div class="test-content">
            <div class="test-name">${test.name}</div>
            ${test.error ? `<div class="test-error">${test.error}</div>` : ''}
          </div>
        </div>
      `;
    });
    
    html += `</div>`;
  }
  
  results.innerHTML = html;
  
  btn.disabled = false;
  btn.textContent = 'Run All Tests';
  progress.style.display = 'none';
}
</script>
